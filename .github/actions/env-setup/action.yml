name: 'Environment Setup'
description: 'Setup environment for CI'
inputs:
  aqua_config:
    description: 'Aqua config file path'
    required: false
    default: aqua/aqua.yaml
  GITHUB_TOKEN:
    description: 'GITHUB_TOKEN'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Set up Golang
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: false
    - name: Install aqua
      uses: aquaproj/aqua-installer@v4.0.4
      with:
        aqua_version: v2.59.1
        policy_allow: "true"
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        AQUA_CONFIG: ${{ inputs.aqua_config }}
        AQUA_LOG_COLOR: always
    - name: Install aqua packages
      shell: bash
      run: aqua install
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        AQUA_CONFIG: ${{ inputs.aqua_config }}
    - name: Add aqua bin to PATH
      shell: bash
      run: echo "$HOME/.local/share/aquaproj-aqua/bin" >> "$GITHUB_PATH"
